<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crudzocial</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" id="navbar" style="display: none;">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-share"></i> Crudzocial</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#" data-page="images"><i class="bi bi-images"></i> Imágenes</a>
                <a class="nav-link" href="#" data-page="notes"><i class="bi bi-journal-text"></i> Notas</a>
                <a class="nav-link" href="#" data-page="profile"><i class="bi bi-person"></i> Perfil</a>
                <a class="nav-link" href="#" data-page="users" id="adminPanel" style="display: none;"><i class="bi bi-gear"></i> Admin</a>
                <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Salir</a>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-4">
        <!-- Login Page -->
        <div id="loginPage" class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3><i class="bi bi-share"></i> Crudzocial</h3>
                        <p class="mb-0">Iniciar Sesión</p>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                        </form>
                        <div class="text-center mt-3">
                            <small class="text-muted">¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a></small>
                        </div>
                        <div id="loginError" class="alert alert-danger mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerPage" class="row justify-content-center" style="display: none;">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white text-center">
                        <h3>Registro de Usuario</h3>
                    </div>
                    <div class="card-body">
                        <form id="registerForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="regName" class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="regName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="regLastName" class="form-label">Apellido</label>
                                    <input type="text" class="form-control" id="regLastName" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="regEmail" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="regEmail" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="regPassword" class="form-label">Contraseña</label>
                                    <input type="password" class="form-control" id="regPassword" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="regPhone" class="form-label">Teléfono</label>
                                    <input type="tel" class="form-control" id="regPhone">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="regCountry" class="form-label">País</label>
                                    <input type="text" class="form-control" id="regCountry">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="regCity" class="form-label">Ciudad</label>
                                    <input type="text" class="form-control" id="regCity">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="regPostalCode" class="form-label">Código Postal</label>
                                    <input type="text" class="form-control" id="regPostalCode">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="regAddress" class="form-label">Dirección</label>
                                <input type="text" class="form-control" id="regAddress">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">Registrarse</button>
                                <button type="button" class="btn btn-secondary" id="backToLogin">Volver al Login</button>
                            </div>
                        </form>
                        <div id="registerError" class="alert alert-danger mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notes Page -->
        <div id="notesPage" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-journal-text"></i> Mis Notas</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#noteModal">
                    <i class="bi bi-plus-circle"></i> Nueva Nota
                </button>
            </div>
            <div id="notesContainer" class="row"></div>
        </div>

    <!-- Note Modal -->
    <div class="modal fade" id="noteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="noteModalTitle">Nueva Nota</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="noteForm">
                        <div class="mb-3">
                            <label for="noteTitle" class="form-label">Título</label>
                            <input type="text" class="form-control" id="noteTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="noteContent" class="form-label">Contenido</label>
                            <textarea class="form-control" id="noteContent" rows="5" required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveNoteBtn">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>
</body>
</html>
